<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fcf9f8;
            color: #1c1b1b;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Hide scrollbar for clean UI */
        ::-webkit-scrollbar {
            display: none;
        }
        /* Custom Input Styles */
        .form-input {
            width: 100%;
            background-color: #F5F5F5;
            border: 1px solid transparent;
            border-radius: 12px;
            padding: 16px;
            font-size: 16px;
            color: #1c1b1b;
            transition: all 0.3s ease;
        }
        .form-input:focus {
            outline: none;
            border-color: #1b4332;
            background-color: #ffffff;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.04);
        }
        .form-input::placeholder {
            color: #717973;
        }
        
        .ambient-shadow {
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.04);
        }
    </style>
</head>
<body class="bg-background relative overflow-x-hidden antialiased">
<!-- Texture Background -->
<div class="fixed inset-0 z-0 pointer-events-none opacity-30" style="background-image: url('https://lh3.googleusercontent.com/aida/AP1WRLtCnwdzZlfg-RR_ePHqk_yOZV5-bcSpDz3yeDh7kUyUOy_h0xkNVCYSPC38Lz98ZXzS6jxIZwCuQ7UFFNzpPTnqAqwmMYYYq-xRxlPz2yBi3WoILAGbpybdfQ5sEOLG9PXWSiKG9EDC8eG-KSXZk0rspn3ZY5HemiJKrqJp9pRnor9jM2y7gnqEjq6ISqAAfKBoSKRgMg-rl44ZCJX1QrwazV5S7lEYA2IK59gzL9_JC-9IqDtYPjlZyjnA'); background-size: cover; background-position: center; mix-blend-mode: multiply;"></div>
<!-- Main Content Container -->
<main class="relative z-10 flex-1 flex flex-col px-container-padding-mobile md:px-container-padding-desktop w-full max-w-[600px] mx-auto min-h-screen py-10 justify-center">
<!-- Top Header & Logo -->
<div class="flex flex-col items-center mb-stack-md">
<img alt="Your Portion Logo" class="w-16 h-16 rounded-xl mb-4 ambient-shadow" src="https://lh3.googleusercontent.com/aida/AP1WRLuyJwtOvEIwfLgZbzOWNKsgf_4a2z8OWcl_i2dBGMd28G4DrWhvSSD0EVEp8Fm6mTlK8XKZ7D7L1JSkTXluHCyDvq2i1nCFSYrh9jo6KSeNBii5CSuFToIJZsAXeqDX2Z3nkFWOq8VlX6Src-plKGwhX6ZK4gnn83DVs6reXgkzVyp4UlaWgS8ijLh_ViRT71IMmdrf0aKh7VWbFBHymCG2T5FmsvsTkbO-zH57ZZsz5b2UyZmJV1umLEDO"/>
<h1 class="font-display text-headline-md font-bold text-primary">Your Portion</h1>
</div>
<!-- Section Title -->
<div class="text-center mb-stack-lg">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-background mb-stack-sm">Join the Community</h2>
<p class="font-body-md text-body-md text-on-surface-variant max-w-sm mx-auto">Start your journey of faith, stewardship, and Kingdom impact today.</p>
</div>
<!-- Registration Form -->
<form action="#" class="flex flex-col gap-stack-md w-full" method="POST">
<!-- Full Name -->
<div class="relative">
<input class="form-input" id="fullName" name="fullName" placeholder="Full Name" required="" type="text"/>
</div>
<!-- Email Address -->
<div class="relative">
<input class="form-input" id="email" name="email" placeholder="Email Address" required="" type="email"/>
</div>
<!-- Password -->
<div class="relative group">
<input class="form-input pr-12" id="password" name="password" placeholder="Password" required="" type="password"/>
<button class="absolute right-4 top-1/2 transform -translate-y-1/2 text-outline hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
<!-- Confirm Password -->
<div class="relative group">
<input class="form-input pr-12" id="confirmPassword" name="confirmPassword" placeholder="Confirm Password" required="" type="password"/>
<button class="absolute right-4 top-1/2 transform -translate-y-1/2 text-outline hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
<!-- Terms Agreement -->
<div class="flex items-start mt-2">
<div class="flex items-center h-5">
<input class="w-5 h-5 rounded bg-surface-container-high border-transparent text-primary-container focus:ring-primary-container focus:ring-offset-background" id="terms" name="terms" required="" type="checkbox"/>
</div>
<div class="ml-3 text-sm">
<label class="font-body-md text-body-md text-on-surface-variant" for="terms">
                        I agree to the <a class="text-primary-container font-medium hover:underline" href="#">Terms of Service</a> and <a class="text-primary-container font-medium hover:underline" href="#">Privacy Policy</a>.
                    </label>
</div>
</div>
<!-- Primary Action -->
<button class="w-full min-h-[56px] bg-primary-container text-on-primary rounded-xl font-label-md text-label-md tracking-wider uppercase flex items-center justify-center hover:opacity-90 transition-opacity mt-4 ambient-shadow focus:outline-none focus:ring-2 focus:ring-primary-container focus:ring-offset-2 focus:ring-offset-background" type="submit">
                Create Account
            </button>
</form>
<!-- Social Sign Up Divider -->
<div class="relative flex items-center py-stack-md w-full">
<div class="flex-grow border-t border-surface-container-high"></div>
<span class="flex-shrink-0 mx-4 font-caption text-caption text-outline uppercase tracking-wider">or sign up with</span>
<div class="flex-grow border-t border-surface-container-high"></div>
</div>
<!-- Social Buttons -->
<div class="flex flex-col gap-4 w-full">
<button class="w-full min-h-[56px] bg-surface-bright border border-surface-container-highest text-on-background rounded-xl font-label-md text-label-md flex items-center justify-center hover:bg-surface-container-lowest transition-colors focus:outline-none focus:ring-2 focus:ring-primary-container focus:ring-offset-1" type="button">
<span class="material-symbols-outlined mr-3 text-on-surface-variant">account_circle</span>
                Continue with Google
            </button>
<button class="w-full min-h-[56px] bg-surface-bright border border-surface-container-highest text-on-background rounded-xl font-label-md text-label-md flex items-center justify-center hover:bg-surface-container-lowest transition-colors focus:outline-none focus:ring-2 focus:ring-primary-container focus:ring-offset-1" type="button">
<span class="material-symbols-outlined mr-3 text-on-surface-variant">apps</span>
                Continue with Apple
            </button>
</div>
<!-- Footer Note -->
<div class="mt-stack-lg text-center pb-8">
<p class="font-body-md text-body-md text-on-surface-variant mb-4">
                Already have an account? <a class="text-primary-container font-semibold hover:underline" href="#">Sign In</a>
</p>
<div class="flex items-center justify-center text-outline gap-2 opacity-70">
<span class="material-symbols-outlined text-sm">lock</span>
<span class="font-caption text-caption">Secure and encrypted registration.</span>
</div>
</div>
</main>
</body></html>
