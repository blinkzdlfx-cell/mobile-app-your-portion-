<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Smooth transitions for interactive elements */
        .interactive-card {
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), 
                        background-color 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .interactive-card:active {
            transform: scale(0.98);
            background-color: theme('colors.surface-container-low');
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface-container-lowest text-on-surface antialiased font-body-md text-body-md flex flex-col min-h-screen">
<!-- Top App Bar (Task-focused, suppressing global nav) -->
<header class="flex justify-between items-center px-container-padding-mobile md:px-container-padding-desktop h-16 w-full max-w-7xl mx-auto bg-surface-container-lowest sticky top-0 z-10">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors text-on-surface-variant active:scale-95">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md-mobile md:text-headline-md text-on-surface tracking-tight absolute left-1/2 -translate-x-1/2">
            Help &amp; Support
        </h1>
<div class="w-10 h-10"></div> <!-- Spacer to balance flex-between -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-md mx-auto px-container-padding-mobile pb-stack-lg flex flex-col gap-stack-md pt-stack-sm">
<!-- Search Bar -->
<div class="relative w-full">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">search</span>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-transparent rounded-[16px] font-body-md text-body-md text-on-surface placeholder-outline focus:border-primary-container focus:ring-0 focus:bg-surface-container-lowest transition-all" placeholder="Search for help..." type="text"/>
</div>
<!-- Quick Help Section -->
<section class="flex flex-col gap-stack-sm">
<h2 class="font-label-md text-label-md text-on-surface-variant px-2 uppercase tracking-wider">Quick Help</h2>
<div class="bg-surface-container-lowest border border-surface-container-highest rounded-[20px] shadow-[0px_10px_30px_rgba(0,0,0,0.02)] overflow-hidden">
<button class="w-full flex items-center justify-between p-5 interactive-card border-b border-surface-container-highest last:border-b-0 group">
<div class="flex items-center gap-4 text-on-surface">
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary-container transition-colors">help</span>
<span class="font-body-md text-body-md text-left">Frequently Asked Questions</span>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</button>
<button class="w-full flex items-center justify-between p-5 interactive-card border-b border-surface-container-highest last:border-b-0 group">
<div class="flex items-center gap-4 text-on-surface">
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary-container transition-colors">storefront</span>
<span class="font-body-md text-body-md text-left">How to Use the Marketplace</span>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</button>
<button class="w-full flex items-center justify-between p-5 interactive-card border-b border-surface-container-highest last:border-b-0 group">
<div class="flex items-center gap-4 text-on-surface">
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary-container transition-colors">diversity_1</span>
<span class="font-body-md text-body-md text-left">How to Create a Kingdom Project</span>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</button>
<button class="w-full flex items-center justify-between p-5 interactive-card border-b border-surface-container-highest last:border-b-0 group">
<div class="flex items-center gap-4 text-on-surface">
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary-container transition-colors">verified_user</span>
<span class="font-body-md text-body-md text-left">Trusted Member Guide</span>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</button>
</div>
</section>

<button class="w-full flex items-center justify-between p-5 interactive-card border-b border-surface-container-highest last:border-b-0 group">
<div class="flex items-center gap-4 text-on-surface">

</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</button>
<button class="w-full flex items-center justify-between p-5 interactive-card border-b border-surface-container-highest last:border-b-0 group">
<div class="flex items-center gap-4 text-on-surface">
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary-container transition-colors">forum</span>
<span class="font-body-md text-body-md text-left">WhatsApp Support</span>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</button>
<button class="w-full flex items-center justify-between p-5 interactive-card border-b border-surface-container-highest last:border-b-0 group">
<div class="flex items-center gap-4 text-on-surface">
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary-container transition-colors">call</span>
<span class="font-body-md text-body-md text-left">Call Support</span>
</div>
<span class="material-symbols-outlined text-outline-variant">chevron_right</span>
</button>
</div>

<div class="w-12 h-12 rounded-full bg-secondary-container/30 flex items-center justify-center mx-auto mb-2">
<span class="material-symbols-outlined text-primary-container">lightbulb</span>
</div>
<p class="font-body-md text-body-md text-on-surface-variant">

                </p>
<button class="w-full min-h-[56px] bg-primary-container text-on-primary font-label-md text-label-md rounded-xl flex items-center justify-center mt-2 hover:bg-tertiary-container active:scale-95 transition-all shadow-[0px_10px_30px_rgba(27,67,50,0.15)]">
                    Send Feedback

</div>
</section>

<footer class="w-full max-w-md mx-auto px-container-padding-mobile pb-8 pt-4">
<p class="font-caption text-caption text-center text-outline text-balance">
            We're here to help you grow in faith, stewardship, and community.
        </p>
</footer>
