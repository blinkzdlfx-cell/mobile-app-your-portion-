<body class="bg-surface text-on-surface min-h-screen relative overflow-hidden font-body-md antialiased md:max-w-[480px] md:mx-auto md:border-x border-surface-variant md:shadow-2xl">
<!-- Background Texture -->
<div class="absolute inset-0 bg-pattern z-0"></div>
<!-- Navigation suppressed as this is a linear/transactional screen -->
<!-- Top App Bar -->
<header class="relative z-10 flex items-center justify-between px-container-padding-mobile h-16 w-full bg-surface/80 backdrop-blur-xl">
<button class="text-primary hover:opacity-70 transition-opacity scale-95 active:scale-90 transition-transform p-2 -ml-2 rounded-full hover:bg-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/20">
<span class="material-symbols-outlined text-[24px]">arrow_back</span>
</button>
<h1 class="font-display text-body-lg font-semibold text-primary tracking-tight absolute left-1/2 -translate-x-1/2">Your Portion</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="relative z-10 flex flex-col px-container-padding-mobile pt-stack-md pb-stack-lg h-[calc(100vh-64px)] overflow-y-auto">
<div class="flex-1 flex flex-col max-w-[400px] mx-auto w-full">
<!-- Header Text -->
<div class="mb-stack-lg animate-fade-in-up">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-stack-sm">Forgot Your Password?</h2>
<p class="font-body-md text-body-md text-on-surface-variant">No worries. Enter your email address and we'll send you a secure link to reset your password.</p>
</div>
<!-- Form Area -->
<form class="space-y-stack-md flex-1 animate-fade-in-up" style="animation-delay: 0.1s;">
<!-- Input Field -->
<div class="relative group">
<label class="sr-only" for="email">Email Address</label>
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline group-focus-within:text-primary transition-colors">mail</span>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-xl font-body-md text-on-surface placeholder-outline focus:ring-2 focus:ring-primary focus:bg-surface transition-all shadow-[0px_4px_12px_rgba(0,0,0,0.02)] focus:shadow-[0px_8px_24px_rgba(27,67,50,0.08)]" id="email" name="email" placeholder="Email Address" required="" type="email"/>
</div>
<!-- Primary Button -->
<button class="w-full min-h-[56px] bg-primary-container text-on-primary rounded-[16px] font-label-md text-label-md flex items-center justify-center gap-2 hover:bg-primary transition-colors active:scale-[0.98] shadow-[0px_10px_30px_rgba(27,67,50,0.15)]" type="submit">
                    Send Reset Link
                </button>
<!-- Info Card -->
<div class="bg-surface-container border border-surface-variant rounded-[16px] p-4 flex gap-3 items-start mt-stack-md">
<span class="material-symbols-outlined text-primary-container mt-0.5">info</span>
<p class="font-caption text-caption text-on-surface-variant leading-relaxed">
                        Check your inbox and spam folder if you don't receive the email within a few minutes.
                    </p>
</div>
</form>
<!-- Footer Area -->
<div class="mt-auto pt-stack-lg pb-stack-sm text-center animate-fade-in-up" style="animation-delay: 0.2s;">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Remember your password? 
                    <a class="font-medium text-primary-container hover:text-primary transition-colors underline-offset-4 hover:underline" href="#">Sign In</a>
</p>
</div>
</div>
</main>
<style>
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-in-up {
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
        }
    </style>
