<style>
        .ambient-shadow {
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.04);
        }
        .input-focus-ring:focus-within {
            border-color: #1B4332;
        }
    </style>

<body class="bg-background text-on-background min-h-screen relative font-body-md overflow-x-hidden">
<!-- Background Texture -->
<div class="absolute inset-0 z-0 pointer-events-none w-full h-full bg-cover bg-center" style="background-image: url('https://lh3.googleusercontent.com/aida/AP1WRLtCnwdzZlfg-RR_ePHqk_yOZV5-bcSpDz3yeDh7kUyUOy_h0xkNVCYSPC38Lz98ZXzS6jxIZwCuQ7UFFNzpPTnqAqwmMYYYq-xRxlPz2yBi3WoILAGbpybdfQ5sEOLG9PXWSiKG9EDC8eG-KSXZk0rspn3ZY5HemiJKrqJp9pRnor9jM2y7gnqEjq6ISqAAfKBoSKRgMg-rl44ZCJX1QrwazV5S7lEYA2IK59gzL9_JC-9IqDtYPjlZyjnA'); opacity: 0.03;"></div>
<!-- Main Container -->
<main class="relative z-10 min-h-screen flex flex-col justify-center px-container-padding-mobile md:px-container-padding-desktop max-w-md mx-auto py-12">
<!-- Header -->
<header class="flex flex-col items-center text-center mb-stack-lg">
<div class="flex items-center justify-center gap-unit mb-stack-md">
<img alt="Your Portion Logo" class="w-8 h-8 object-contain rounded-md" src="https://lh3.googleusercontent.com/aida/AP1WRLuyJwtOvEIwfLgZbzOWNKsgf_4a2z8OWcl_i2dBGMd28G4DrWhvSSD0EVEp8Fm6mTlK8XKZ7D7L1JSkTXluHCyDvq2i1nCFSYrh9jo6KSeNBii5CSuFToIJZsAXeqDX2Z3nkFWOq8VlX6Src-plKGwhX6ZK4gnn83DVs6reXgkzVyp4UlaWgS8ijLh_ViRT71IMmdrf0aKh7VWbFBHymCG2T5FmsvsTkbO-zH57ZZsz5b2UyZmJV1umLEDO"/>
<span class="font-headline-md text-headline-md font-semibold text-primary">Your Portion</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-stack-sm md:font-headline-lg md:text-headline-lg">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-xs mx-auto">Sign in to continue your journey of faith, stewardship, and community.</p>
</header>
<!-- Form -->
<form class="flex flex-col gap-stack-md w-full mb-stack-lg">
<!-- Email Input -->
<div class="relative w-full">
<label class="sr-only" for="email">Email Address</label>
<div class="flex items-center bg-surface-container rounded-xl px-4 py-3 border border-transparent input-focus-ring transition-colors duration-200">
<span class="material-symbols-outlined text-on-surface-variant mr-3">mail</span>
<input class="bg-transparent border-none p-0 w-full font-body-md text-on-surface placeholder:text-on-surface-variant/60 focus:ring-0" id="email" name="email" placeholder="Email Address" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="relative w-full">
<label class="sr-only" for="password">Password</label>
<div class="flex items-center bg-surface-container rounded-xl px-4 py-3 border border-transparent input-focus-ring transition-colors duration-200">
<span class="material-symbols-outlined text-on-surface-variant mr-3">lock</span>
<input class="bg-transparent border-none p-0 w-full font-body-md text-on-surface placeholder:text-on-surface-variant/60 focus:ring-0" id="password" name="password" placeholder="Password" required="" type="password"/>
<button class="ml-2 text-on-surface-variant hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Remember Me & Forgot Password -->
<div class="flex items-center justify-between mt-unit mb-stack-sm">
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline text-primary-container focus:ring-primary-container bg-transparent" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-label-md text-label-md text-on-surface-variant" for="remember-me">
                        Remember Me
                    </label>
</div>
<div class="text-sm">
<a class="font-label-md text-label-md font-medium text-primary hover:text-primary-container transition-colors" href="#">
                        Forgot Password?
                    </a>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full flex justify-center items-center py-4 px-4 border border-transparent rounded-xl shadow-sm font-label-md text-label-md font-semibold text-on-primary bg-primary-container hover:opacity-90 active:scale-[0.98] transition-all duration-200 ambient-shadow h-[56px]" type="submit">
                Sign In
            </button>
</form>
<!-- Social Sign-In -->
<div class="mt-2 w-full">
<div class="relative">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-surface-variant"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-background font-caption text-caption text-on-surface-variant">or continue with</span>
</div>
</div>
<div class="mt-stack-md flex flex-col gap-unit w-full">
<button class="w-full inline-flex justify-center items-center py-3 px-4 rounded-xl border border-outline-variant bg-surface text-on-surface hover:bg-surface-container-low transition-colors duration-200 font-label-md text-label-md h-[56px]" type="button">
<span class="mr-2 h-5 w-5 flex items-center justify-center font-bold">G</span>
                    Continue with Google
                </button>
<button class="w-full inline-flex justify-center items-center py-3 px-4 rounded-xl border border-outline-variant bg-surface text-on-surface hover:bg-surface-container-low transition-colors duration-200 font-label-md text-label-md h-[56px]" type="button">
<span class="material-symbols-outlined mr-2 text-[20px]">apps</span>
                    Continue with Apple
                </button>
</div>
</div>
<!-- Footer -->
<footer class="mt-stack-lg text-center pb-safe w-full">
<p class="font-body-md text-body-md text-on-surface-variant mb-stack-md">
                Don't have an account? <a class="font-medium text-primary hover:text-primary-container transition-colors" href="#">Create Account</a>
</p>
<div class="flex items-center justify-center gap-1 text-on-surface-variant opacity-80">
<span class="material-symbols-outlined text-[14px]">shield</span>
<span class="font-caption text-caption">Your information is securely protected.</span>
</div>
</footer>
</main>
</body></html>
