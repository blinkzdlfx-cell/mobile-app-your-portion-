name: Supabase Keep-Alive

on:
  schedule:
    # Run every Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to keep project active
        run: |
          curl -X GET \
            "${{ secrets.SUPABASE_PROJECT_URL }}/rest/v1/" \
            -H "apikey: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal"
          
          echo "✅ Supabase keep-alive ping completed successfully"
